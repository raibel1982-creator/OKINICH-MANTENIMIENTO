<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okinich | Ingeniería que siempre cumple</title>
    <!-- Importación de la tipografía oficial Raleway -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Raleway:wght@400;500;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Raleway', sans-serif;
            background-color: #0A1F3D; /* Azul Okinich */
            color: #F2F2F2; /* Gris Claro */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            box-sizing: border-box;
        }

        .container {
            max-width: 600px;
            padding: 40px 20px;
        }

        .logo-container {
            margin-bottom: 30px;
        }

        h1 {
            font-weight: 800;
            font-size: 1.8rem;
            color: #2E7D32; /* Verde Energía */
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .eslogan {
            font-weight: 500;
            font-size: 1rem;
            color: #686E70; /* Gris Técnico */
            letter-spacing: 1px;
            margin-top: -10px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        p {
            font-weight: 400;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .contact-btn {
            display: inline-block;
            background-color: #2E7D32; /* Verde Energía */
            color: #FFFFFF;
            text-decoration: none;
            font-weight: 800;
            padding: 12px 30px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.3s ease;
        }

        .contact-btn:hover {
            background-color: #236126;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logotipo centrado -->
        <div class="logo-container">
            <img src="logo.png" alt="Okinich" style="max-width: 250px; height: auto; filter: brightness(0) invert(1); opacity: 0.95;">
        </div>

        <!-- Eslogan institucional -->
        <div class="eslogan">Ingeniería que siempre cumple</div>

        <!-- Mensaje de mantenimiento -->
        <h1>Sitio en mantenimiento</h1>
        <p>Estamos trabajando en nuestra nueva plataforma digital para ofrecerte soluciones eficientes y sostenibles.</p>
        
        <!-- Enlace directo para llamar o mandar WhatsApp -->
        <a href="https://wa.me" target="_blank" class="contact-btn">Contáctanos al 5663573113</a>
    </div>

</body>
</html>
